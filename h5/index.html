<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>善见童子</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="game-container">
      <img class="background" src="Assets/image/ShanJian_Background.png" alt="background">
      
      <!-- 开始界面 -->
      <div class="screen start-screen" data-screen="start">
        <img class="info-btn" src="Assets/image/Shanjian_infomation_BTN.png" alt="info" onclick="onShowGuide()">
        <button class="btn start-btn" onclick="onStartQuestion()">提问</button>
      </div>

      <!-- 玩法说明弹窗 -->
      <div class="guide-overlay" id="guideOverlay" onclick="onCloseGuide()">
        <div class="guide-popup" onclick="event.stopPropagation()">
          <img class="guide-bg" src="Assets/image/Shanjian_game_comment_new.png" alt="guide">
          <div class="guide-content">
            <div class="guide-section">
              <div class="guide-subtitle">如何提问</div>
              <span class="guide-text">点击「提问」按钮，在令牌上写下你想问的问题，然后点击「提问」提交。</span>
            </div>
            <div class="guide-section">
              <div class="guide-subtitle">三种结果</div>
              <div class="guide-item">
                <div class="guide-dots">
                  <div class="guide-dot red"></div>
                  <div class="guide-dot red"></div>
                </div>
                <span class="guide-text">童子允诺，此事可行</span>
              </div>
              <div class="guide-item">
                <div class="guide-dots">
                  <div class="guide-dot red"></div>
                  <div class="guide-dot black"></div>
                </div>
                <span class="guide-text">童子笑而不答，此事尚不确定</span>
              </div>
              <div class="guide-item">
                <div class="guide-dots">
                  <div class="guide-dot black"></div>
                  <div class="guide-dot black"></div>
                </div>
                <span class="guide-text">童子不允，此事不可行</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 令牌输入界面 -->
      <div class="screen input-screen" data-screen="input">
        <div class="lingpai-wrapper" id="lingpaiWrapper">
          <div class="lingpai-container">
            <img class="lingpai-bg" src="Assets/image/ShanJian_Lingpai.png" alt="lingpai">
            <canvas id="writeCanvas" class="write-canvas"></canvas>
          </div>
        </div>
        <div class="input-btns">
          <button class="btn rewrite-btn" onclick="onRewrite()">重写</button>
          <button class="btn submit-btn" onclick="onSubmitQuestion()">提问</button>
        </div>
      </div>
      
      <!-- 投币动画界面 -->
      <div class="screen throw-screen" data-screen="throwing">
        <div class="throw-container">
          <div class="lingpai-throw" id="lingpaiThrow">
            <img class="lingpai-img" src="Assets/image/ShanJian_Lingpai.png" alt="lingpai">
          </div>
          <div class="tangbing-wrapper" id="tangbingWrapper">
            <img class="tangbing" src="Assets/image/ShanJian_Tangbing.png" alt="tangbing">
          </div>
        </div>
      </div>
      
      <!-- 等待界面 -->
      <div class="screen waiting-screen" data-screen="waiting">
        <span class="waiting-text">童子显灵中...</span>
      </div>
      
      <!-- 结果界面 -->
      <div class="screen result-screen" data-screen="result">
        <div class="result-wrapper" id="resultWrapper">
          <div class="result-lingpai">
            <img class="lingpai-bg" src="Assets/image/ShanJian_Lingpai.png" alt="lingpai">
            <img id="userDrawing" class="user-drawing" src="" alt="drawing">
            <div class="tangbing-result">
              <div class="result-dot" id="resultDot0"></div>
              <div class="result-dot" id="resultDot1"></div>
            </div>
          </div>
        </div>
        <button class="btn again-btn" onclick="onPlayAgain()">再来一次</button>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
